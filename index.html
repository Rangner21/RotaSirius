<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Rota Sirius</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- TELA DE LOGIN -->
<div id="login-screen" class="login-overlay">
    <div class="login-box">
        <div class="login-header">
            <div class="logo">🚛 Rota Sirius</div>
            <p>Acesse o sistema de roteirização</p>
        </div>
        <form id="login-form">
            <div class="form-group">
                <label for="login-email">E-mail</label>
                <input type="email" id="login-email" placeholder="nome.sobrenome@empresa.com" required autocomplete="username">
            </div>
            <div class="form-group" style="margin-top: 10px;">
                <label for="login-password">Senha</label>
                <input type="password" id="login-password" placeholder="••••••••" required autocomplete="current-password">
            </div>
            <p id="login-error" class="hidden"></p>
            <button type="submit" class="btn btn-login">Entrar</button>
        </form>
    </div>
</div>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo">🚛 Rota Sirius</div>

    <button class="btn" id="open-nf-modal-btn">+ Nova NF</button>

    <input type="text" placeholder="Buscar NF ou destino..." class="search">

    <div class="filters">

  <button onclick="trocarFiltro('todos')">
    Todos <span id="count-todos">0</span>
  </button>

  <button onclick="trocarFiltro('transporte')">
    Transporte <span id="count-transporte">0</span>
  </button>

  <button onclick="trocarFiltro('retira')">
    Retira <span id="count-retira">0</span>
  </button>

</div>


    <div class="nf-list"></div>

    <button class="btn btn-logout" id="logout-btn">Sair do Sistema</button>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- Visão Principal (Dashboard) -->
    <div id="dashboard-view">
      <div class="topbar">
        <h2>Roteirização</h2>
        <div style="display: flex; gap: 12px; align-items: center;">
          <button class="btn btn-outline" id="open-control-panel-btn">⚙ Painel de Controle</button>
          <button class="btn btn-outline" id="open-history-btn">⏱ Histórico</button>
          <button class="btn" id="open-rota-modal-btn">+ Nova Rota</button>
          <div id="user-display-dashboard" class="user-display"></div>
        </div>
      </div>
      <div class="rotas"></div>
    </div>

    <!-- Visão do Painel de Controle -->
    <div id="control-panel-view" class="hidden">
      <div class="topbar">
        <h2>Painel de Controle</h2>
        <div style="display: flex; gap: 12px; align-items: center;">
          <button class="btn btn-outline" id="back-to-dashboard-btn">← Voltar</button>
          <div id="user-display-panel" class="user-display"></div>
        </div>
      </div>
      <div class="panel-container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
          <h3 style="margin: 0;">Gerenciamento de Usuários</h3>
          <button class="btn" id="add-user-btn" style="margin: 0;">+ Adicionar Usuário</button>
        </div>
        <table class="data-table">
          <thead>
            <tr>
              <th>Nome</th>
              <th>Cargo</th>
              <th>E-mail</th>
              <th>Permissão</th>
              <th>Status</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="users-table-body">
          <!-- Usuários carregados via JS -->
          </tbody>
        </table>
      </div>
    </div>

  </main>

</div>

<!-- Modal para Nova NF -->
<div id="create-nf-modal" class="modal-overlay">
    <div class="modal-content">
        <h3 id="nf-modal-title">Adicionar Nova NF</h3>
        <span class="close-button">&times;</span>
        <form id="create-nf-form">
            <input type="hidden" id="nf-id-hidden">
            <label for="nf-numero">Número da NF:</label>
            <input type="text" id="nf-numero" required>

            <div class="nf-tipo-toggle">
                <button type="button" id="btn-transporte" class="btn-toggle active">Transporte</button>
                <button type="button" id="btn-retira" class="btn-toggle">Retira</button>
                <input type="hidden" id="nf-tipo" value="transporte">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="nf-destino">Destino:</label>
                    <input type="text" id="nf-destino" required>
                </div>
                <div class="form-group" style="flex: 0 0 100px;">
                    <label for="nf-uf">UF:</label>
                    <select id="nf-uf" required>
                        <option value="" disabled selected>UF</option>
                        <option value="AC">AC</option><option value="AL">AL</option>
                        <option value="AP">AP</option><option value="AM">AM</option>
                        <option value="BA">BA</option><option value="CE">CE</option>
                        <option value="DF">DF</option><option value="ES">ES</option>
                        <option value="GO">GO</option><option value="MA">MA</option>
                        <option value="MT">MT</option><option value="MS">MS</option>
                        <option value="MG">MG</option><option value="PA">PA</option>
                        <option value="PB">PB</option><option value="PR">PR</option>
                        <option value="PE">PE</option><option value="PI">PI</option>
                        <option value="RJ">RJ</option><option value="RN">RN</option>
                        <option value="RS">RS</option><option value="RO">RO</option>
                        <option value="RR">RR</option><option value="SC">SC</option>
                        <option value="SP">SP</option><option value="SE">SE</option>
                        <option value="TO">TO</option>
                    </select>
                </div>
            </div>

            <label for="nf-valor">Valor de Frete:</label>
            <input type="number" id="nf-valor" step="0.01" required>

            <label for="nf-obs">Observação:</label>
            <input type="text" id="nf-obs" placeholder="Opcional">

            <button type="submit" class="btn">Salvar NF</button>
        </form>
    </div>
</div>

<!-- Modal para Nova Rota -->
<div id="create-rota-modal" class="modal-overlay">
    <div class="modal-content">
        <h3 id="rota-modal-title">Adicionar Nova Rota</h3>
        <span class="close-button">&times;</span>
        <form id="create-rota-form">
            <input type="hidden" id="rota-id-hidden">
            <label for="rota-nome">Nome da rota (ex: Recife 15/04):</label>
            <input type="text" id="rota-nome" required>
            <button type="submit" class="btn">Salvar Rota</button>
        </form>
    </div>
</div>

<!-- Modal Genérico de Confirmação e Aviso -->
<div id="generic-modal" class="modal-overlay">
    <div class="modal-content">
        <h3 id="generic-modal-title">Aviso</h3>
        <span class="close-button">&times;</span>
        <p id="generic-modal-message" style="text-align: center; margin-bottom: 20px; color: var(--text-main); line-height: 1.5;"></p>
        <div class="form-row">
            <button id="generic-modal-cancel" class="btn-toggle">Cancelar</button>
            <button id="generic-modal-ok" class="btn" style="margin-top: 0;">Confirmar</button>
        </div>
    </div>
</div>

<!-- Modal para Novo Usuário -->
<div id="create-user-modal" class="modal-overlay">
    <div class="modal-content">
        <h3 id="user-modal-title">Adicionar Novo Usuário</h3>
        <span class="close-button">&times;</span>
        <form id="create-user-form">
            <input type="hidden" id="user-id-hidden">
            <div class="form-row">
                <div class="form-group">
                    <label for="user-nome">Nome:</label>
                    <input type="text" id="user-nome" required>
                </div>
                <div class="form-group">
                    <label for="user-sobrenome">Sobrenome:</label>
                    <input type="text" id="user-sobrenome" required>
                </div>
            </div>
            <label for="user-email">E-mail:</label>
            <input type="email" id="user-email" required>
            
            <label for="user-password">Senha:</label>
            <input type="password" id="user-password" required>

            <div class="form-row" style="margin-top: 10px;">
                <div class="form-group">
                    <label for="user-cargo">Cargo:</label>
                    <input type="text" id="user-cargo" required>
                </div>
                <div class="form-group">
                    <label for="user-permissao">Permissão:</label>
                    <select id="user-permissao" required>
                        <option value="Administrador">Administrador</option>
                        <option value="Operador" selected>Operador</option>
                        <option value="Visualizador">Visualizador</option>
                    </select>
                </div>
            </div>
            <button type="submit" class="btn">Salvar Usuário</button>
        </form>
    </div>
</div>

<!-- Modal de Histórico -->
<div id="history-modal" class="modal-overlay">
    <div class="modal-content" style="max-width: 600px;">
        <h3>Histórico de Rotas Finalizadas</h3>
        <span class="close-button">&times;</span>
        
        <div id="history-container" class="history-list">
            <!-- Itens do histórico aparecerão aqui -->
        </div>
    </div>
</div>

<!-- SCRIPTS -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="js/supabase.js"></script>
<script src="js/app.js"></script>

</body>
</html>
