<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>RotaLog</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo">🚚 RotaLog</div>

    <button class="btn" id="open-nf-modal-btn">+ Nova NF</button>

    <input type="text" placeholder="Buscar NF ou destino..." class="search">

    <div class="filters">

  <button onclick="trocarFiltro('todos')">
    Todos <span id="count-todos">0</span>
  </button>

  <button onclick="trocarFiltro('transporte')">
    Transporte <span id="count-transporte">0</span>
  </button>

  <button onclick="trocarFiltro('retira')">
    Retira <span id="count-retira">0</span>
  </button>

</div>


    <div class="nf-list"></div>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <div class="topbar">
      <h2>Roteirização</h2>
      <button class="btn" id="open-rota-modal-btn">+ Nova Rota</button>
    </div>

    <div class="rotas"></div>

  </main>

</div>

<!-- Modal para Nova NF -->
<div id="create-nf-modal" class="modal-overlay">
    <div class="modal-content">
        <h3>Adicionar Nova NF</h3>
        <span class="close-button">&times;</span>
        <form id="create-nf-form">
            <label for="nf-numero">Número da NF:</label>
            <input type="text" id="nf-numero" required>

            <div class="nf-tipo-toggle">
                <button type="button" id="btn-transporte" class="btn-toggle active">Transporte</button>
                <button type="button" id="btn-retira" class="btn-toggle">Retira</button>
                <input type="hidden" id="nf-tipo" value="transporte">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="nf-destino">Destino:</label>
                    <input type="text" id="nf-destino" required>
                </div>
                <div class="form-group" style="flex: 0 0 100px;">
                    <label for="nf-uf">UF:</label>
                    <select id="nf-uf" required>
                        <option value="" disabled selected>UF</option>
                        <option value="AC">AC</option><option value="AL">AL</option>
                        <option value="AP">AP</option><option value="AM">AM</option>
                        <option value="BA">BA</option><option value="CE">CE</option>
                        <option value="DF">DF</option><option value="ES">ES</option>
                        <option value="GO">GO</option><option value="MA">MA</option>
                        <option value="MT">MT</option><option value="MS">MS</option>
                        <option value="MG">MG</option><option value="PA">PA</option>
                        <option value="PB">PB</option><option value="PR">PR</option>
                        <option value="PE">PE</option><option value="PI">PI</option>
                        <option value="RJ">RJ</option><option value="RN">RN</option>
                        <option value="RS">RS</option><option value="RO">RO</option>
                        <option value="RR">RR</option><option value="SC">SC</option>
                        <option value="SP">SP</option><option value="SE">SE</option>
                        <option value="TO">TO</option>
                    </select>
                </div>
            </div>

            <label for="nf-valor">Valor de Frete:</label>
            <input type="number" id="nf-valor" step="0.01" required>

            <label for="nf-obs">Observação:</label>
            <input type="text" id="nf-obs" placeholder="Opcional">

            <button type="submit" class="btn">Salvar NF</button>
        </form>
    </div>
</div>

<!-- Modal para Nova Rota -->
<div id="create-rota-modal" class="modal-overlay">
    <div class="modal-content">
        <h3>Criar Nova Rota</h3>
        <span class="close-button">&times;</span>
        <form id="create-rota-form">
            <label for="rota-nome">Nome da rota (ex: Recife 15/04):</label>
            <input type="text" id="rota-nome" required>
            <button type="submit" class="btn">Salvar Rota</button>
        </form>
    </div>
</div>

<!-- SCRIPTS -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="supabase.js"></script>
<script src="app.js"></script>

</body>
</html>
